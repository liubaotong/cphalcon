name: Phalcon CI

on:
  push:
    paths-ignore:
      - '**.md'
      - '**.txt'
  pull_request:
  workflow_dispatch:

env:
  # All versions should be declared here
  PHALCON_VERSION: 5.10.0
  ZEPHIR_PARSER_VERSION: 1.8.0
  # For tests
  LANG: en_US.UTF-8
  LANGUAGE: en_US.UTF-8
  LC_ALL: en_US.UTF-8

  # Windows specific
  TOOLS_DIR: 'C:\tools'
  CACHE_DIR: 'C:\Downloads'

  # PHP extensions required by Composer
  EXTENSIONS: apcu, gettext, gd, igbinary, imagick, intl, json, mbstring, msgpack, memcached, pcov, sqlite3, yaml, redis, :memcache, openssl

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/master' }}

jobs:
  # PHP CodeSniffer - gates build-and-test and database_test
  phpcs:
    permissions:
      contents: read
    name: Check code style
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'

      - name: Install dependencies
        run: composer install --prefer-dist --ignore-platform-reqs

      - name: Run PHP_CodeSniffer
        run: composer cs

  # Verify that committed build/phalcon/ is up-to-date with Zephir sources
  build_freshness:
    permissions:
      contents: read
    name: Build freshness check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: zephir_parser-${{ env.ZEPHIR_PARSER_VERSION }}

      - name: Install System Dependencies
        run: |
          sudo apt-get update --quiet --yes 1>/dev/null
          sudo apt-get install --no-install-recommends -q -y re2c

      - run: composer install --prefer-dist --ignore-platform-reqs

      - name: Regenerate build tree
        run: |
          vendor/bin/zephir fullclean
          vendor/bin/zephir generate
          (cd build && php gen-build.php)

      - name: Assert no generated-build drift
        run: |
          if ! git diff --exit-code -- build/phalcon; then
            echo "::error::build/phalcon is out-of-date. Please regenerate and commit."
            exit 1
          fi

  # Validate PIE source-build from local checkout
  pie_smoke_test:
    permissions:
      contents: read
    name: PIE smoke test / PHP ${{ matrix.php }}
    runs-on: ubuntu-latest
    needs: [phpcs]
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        php:
          - '8.1'
          - '8.4'
    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: pie

      - name: Install System Dependencies
        run: |
          sudo apt-get update --quiet --yes 1>/dev/null
          sudo apt-get install --no-install-recommends -q -y re2c

      - name: PIE build from local checkout
        run: pie build phalcon/cphalcon

      - name: Validate extension loads
        run: |
          EXT_DIR=$(php-config --extension-dir)
          php -d extension="${EXT_DIR}/phalcon.so" -r 'echo (new Phalcon\Support\Version())->get() . PHP_EOL;'

  # Generate IDE stubs and validate with Psalm
  stubs:
    name: Stubs / PHP ${{ matrix.php }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        php:
          - '8.1'
          - '8.2'
          - '8.3'
          - '8.4'
          - '8.5'

    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: pecl
          extensions: zephir_parser-${{ env.ZEPHIR_PARSER_VERSION }}

      - name: Install System Dependencies
        run: |
          sudo apt-get update --quiet --yes 1>/dev/null
          sudo apt-get install --no-install-recommends -q -y re2c

      - run: composer install --prefer-dist --ignore-platform-reqs

      - name: Validate stubs
        run: |
          vendor/bin/zephir stubs
          vendor/bin/psalm ide/

  # Build Phalcon PECL package (artifact consumed by build-and-test and database_test)
  generate_pecl:
    name: Build Phalcon PECL package
    needs: [phpcs, stubs]
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: zephir_parser-${{ env.ZEPHIR_PARSER_VERSION }}
          tools: pecl
        env:
          COMPOSER_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup APT Repositories
        run: |
          # Remove Microsoft repos — our builds often fail due to
          # unstable/offline Microsoft servers.
          sudo rm -f /etc/apt/sources.list.d/dotnetdev.list
          sudo rm -f /etc/apt/sources.list.d/azure*.list

      - name: Install System Dependencies
        run: |
          sudo apt-get update --quiet --yes 1>/dev/null
          sudo apt-get install --no-install-recommends -q -y re2c

      - run: composer install --ignore-platform-reqs

      - name: Generate C Code
        run: |
          vendor/bin/zephir fullclean
          vendor/bin/zephir generate
          (cd build && php gen-build.php)

      - name: Upload compile-errors.log
        uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: compile-errors
          path: compile-errors.log

      - name: Create Pecl Package
        id: pecl_create
        run: |
          cp build/phalcon/config.w32 config.w32
          cp build/phalcon/phalcon.zep.c phalcon.zep.c
          cp build/phalcon/config.m4 config.m4
          cp build/phalcon/php_phalcon.h php_phalcon.h
          cp build/phalcon/phalcon.zep.h phalcon.zep.h
          pecl package
          phalcon_package="`ls | grep phalcon-*tgz`"
          mv $phalcon_package phalcon-pecl.tgz

      - name: Validate Pecl Package
        run: pecl package-validate phalcon-pecl.tgz

      - name: Upload Artifact
        uses: actions/upload-artifact@v7
        with:
          name: 'phalcon-pecl'
          path: phalcon-pecl.tgz

  # Verify the extension installs cleanly from the build/ directory
  install:
    name: Install / PHP ${{ matrix.php }}
    runs-on: ubuntu-latest
    needs: [phpcs, stubs]
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        php:
          - '8.1'
          - '8.2'
          - '8.3'
          - '8.4'
          - '8.5'

    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: zephir_parser-${{ env.ZEPHIR_PARSER_VERSION }}
          tools: pecl

      - name: Install from build/ directory
        run: |
          cd build/
          php gen-build.php
          sudo ./install

      - name: Validate extension
        if: success()
        run: php -d extension=phalcon -r 'echo (new Phalcon\Support\Version())->get();' || exit 1

  build_extension:
    permissions:
      contents: read

    name: Build / PHP-${{ matrix.php }}-${{ matrix.ts }}-${{ matrix.name }}-${{ matrix.arch }}
    needs: [generate_pecl, install]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        php:
          - '8.1'
          - '8.2'
          - '8.3'
          - '8.4'
        ts:
          - 'nts'
          - 'ts'
        arch:
          - 'x64'

        name:
          - ubuntu-gcc

        include:
          - { name: ubuntu-gcc, os: ubuntu-22.04, compiler: gcc }

    steps:
      - uses: actions/checkout@v6

      - name: Setup platform specific environment
        shell: pwsh
        run: |
          git config --global core.autocrlf false
          $SessionSavePath = if ("${{ runner.os }}" -eq "Windows") { 'C:\temp' } else { '/tmp' }
          Write-Output "SESSION_SAVE_PATH=$SessionSavePath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: ${{ env.EXTENSIONS }}
          ini-values: apc.enable_cli=on, session.save_path=${{ env.SESSION_SAVE_PATH }}, register_argc_argv=on
          tools: pecl, phpize, php-config
        env:
          PHPTS: ${{ matrix.ts }}
          COMPOSER_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Download Phalcon Pecl Package
        uses: actions/download-artifact@v7
        with:
          name: phalcon-pecl
          path: ./phalcon-pecl

      - name: Build Phalcon Extension (Linux)
        if: runner.os == 'Linux'
        id: linux-build
        uses: ./.github/actions/build-phalcon-linux
        with:
          pecl: ./phalcon-pecl/phalcon-pecl.tgz
          php-version: ${{ matrix.php }}

      - name: Upload compiled Phalcon extension (Linux)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v7
        with:
          name: phalcon-so-php${{ matrix.php }}-${{ matrix.ts }}-linux-x64
          path: ${{ steps.linux-build.outputs.extension-dir }}/phalcon.so
          retention-days: 1

      - name: Build Phalcon Extension (macOS)
        if: runner.os == 'macOS'
        uses: ./.github/actions/build-phalcon-macos
        with:
          pecl: ./phalcon-pecl/phalcon-pecl.tgz

      - name: Build Phalcon Extension (Windows)
        if: runner.os == 'Windows'
        uses: ./.github/actions/build-phalcon-win
        with:
          pecl: ./phalcon-pecl/phalcon-pecl.tgz
          php-version: ${{ matrix.php }}
          ts: ${{ matrix.ts }}
          compiler: ${{ matrix.compiler }}
          arch: ${{ matrix.arch }}
          phalcon-version: ${{ env.PHALCON_VERSION }}
          tools-dir: ${{ env.TOOLS_DIR }}
          cache-dir: ${{ env.CACHE_DIR }}
          os: ${{ matrix.os }}

      - name: Pack Phalcon Extension
        shell: pwsh
        run: |
          if ( "${{ runner.os }}" -eq 'Windows' ) {
            $ReleaseFolder = if ("${{ matrix.ts }}" -eq "ts") { "Release_TS" } else { "Release" }
            $ReleaseFolder = if ("${{ matrix.arch }}" -eq "x64") { "x64\${ReleaseFolder}" } else { "${ReleaseFolder}" }
            $ExtPath = "${{ env.TOOLS_DIR }}\pecl\phalcon\phalcon-${{ env.PHALCON_VERSION }}\${ReleaseFolder}\php_phalcon.dll"
          } else {
            $ExtPath = "$(php-config --extension-dir)/phalcon.so"
          }

          if ([string]::IsNullOrEmpty($ExtPath) -or -not (Test-Path $ExtPath)) {
            Write-Error "Phalcon extension not found at: '$ExtPath'"
            exit 1
          }

          $TargetName = "phalcon-php${{ matrix.php }}-${{ matrix.ts }}-${{ matrix.name }}-${{ matrix.arch }}"
          $Destination = "./build-artifacts"

          if (-not (Test-Path -Path $Destination -PathType Container)) {
            New-Item $Destination -ItemType Directory | Out-Null
          }

          Copy-Item -Path $ExtPath -Destination $Destination
          Copy-Item -Path "./3rdparty/licenses/*.txt" -Destination $Destination
          Set-Location $Destination
          & 7z a "$TargetName.zip" *

      - name: Upload Phalcon Extension Artifact
        uses: actions/upload-artifact@v7
        with:
          name: phalcon-php${{ matrix.php }}-${{ matrix.ts }}-${{ matrix.name }}-${{ matrix.arch }}.zip
          path: ./build-artifacts/phalcon*.zip
          retention-days: 30

  unit_test:
    permissions:
      contents: read

    name: Unit / PHP-${{ matrix.php }}-${{ matrix.ts }}-${{ matrix.name }}-${{ matrix.arch }}
    needs: [build_extension]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30

    services:
      redis:
        image: redis:8-alpine
        ports:
          - "6379:6379"
      memcached:
        image: memcached:1.6-alpine
        ports:
          - "11211:11211"

    strategy:
      fail-fast: false
      matrix:
        php:
          - '8.1'
          - '8.2'
          - '8.3'
          - '8.4'
        ts:
          - 'nts'
          - 'ts'
        arch:
          - 'x64'

        name:
          - ubuntu-gcc

        include:
          - { name: ubuntu-gcc, os: ubuntu-22.04, compiler: gcc }

    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: ${{ env.EXTENSIONS }}
          ini-values: apc.enable_cli=on, session.save_path=/tmp, register_argc_argv=on
          tools: pecl, phpize, php-config
          coverage: pcov
        env:
          PHPTS: ${{ matrix.ts }}
          COMPOSER_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Download compiled Phalcon extension
        uses: actions/download-artifact@v7
        with:
          name: phalcon-so-php${{ matrix.php }}-${{ matrix.ts }}-linux-x64
          path: ./phalcon-so

      - name: Install Phalcon extension
        shell: bash
        run: |
          EXT_DIR=$(php-config --extension-dir)
          sudo cp ./phalcon-so/phalcon.so "$EXT_DIR/phalcon.so"
          echo "extension=phalcon" | sudo tee /etc/php/${{ matrix.php }}/cli/conf.d/99-phalcon.ini
          php --ri phalcon

      - name: Validate composer
        run: composer validate --no-check-all --no-check-publish

      - name: Install development dependencies with Composer
        uses: ramsey/composer-install@v3
        with:
          composer-options: "--prefer-dist --ignore-platform-reqs"

      - name: Setup Tests
        shell: bash
        run: |
          ./.ci/linux-setup-locales.sh
          cp tests/_config/.env.default .env
          php tests/_config/generate-db-schemas.php
          vendor/bin/codecept build

      - name: Run Unit Tests
        if: always()
        run: vendor/bin/codecept run --coverage-xml=coverage-unit-${{ matrix.php }}-${{ matrix.ts }}.xml --ext DotReporter unit

      - name: Upload Unit Test Coverage
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-unit-${{ matrix.php }}-${{ matrix.ts }}-${{ matrix.name }}-${{ matrix.arch }}
          path: tests/_output/coverage-unit-${{ matrix.php }}-${{ matrix.ts }}.xml
          retention-days: 7

      - name: Check Release notes parser
        shell: bash
        run: |
          echo "-- Creating Release Notes"
          ./.ci/release-notes.sh ./CHANGELOG-5.0.md

  database_test:
    permissions:
      contents: read

    name: Db / PHP-${{ matrix.php }}
    needs: [build_extension]
    runs-on: ubuntu-latest
    timeout-minutes: 60

    services:
      mysql:
        image: mysql:8.0
        ports:
          - "3306:3306"
        env:
          MYSQL_ROOT_PASSWORD: secret
          MYSQL_USER: phalcon
          MYSQL_DATABASE: phalcon
          MYSQL_PASSWORD: secret
        options: >-
          --health-cmd "mysqladmin ping --silent"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      postgres:
        image: postgres:12-alpine
        ports:
          - "5432:5432"
        env:
          POSTGRES_USER: phalcon
          POSTGRES_PASSWORD: secret
          POSTGRES_DB: phalcon
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:8-alpine
        ports:
          - "6379:6379"
      memcached:
        image: memcached:1.6-alpine
        ports:
          - "11211:11211"

    strategy:
      fail-fast: false
      matrix:
        php:
          - '8.1'
          - '8.2'
          - '8.3'
          - '8.4'

    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: ${{ env.EXTENSIONS }}
          ini-values: apc.enable_cli=on, session.save_path=/tmp, register_argc_argv=on
          coverage: pcov
        env:
          COMPOSER_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Download compiled Phalcon extension
        uses: actions/download-artifact@v7
        with:
          name: phalcon-so-php${{ matrix.php }}-nts-linux-x64
          path: ./phalcon-so


      - name: Install Phalcon extension
        shell: bash
        run: |
          EXT_DIR=$(php-config --extension-dir)
          sudo cp ./phalcon-so/phalcon.so "$EXT_DIR/phalcon.so"
          echo "extension=phalcon" | sudo tee /etc/php/${{ matrix.php }}/cli/conf.d/99-phalcon.ini
          php --ri phalcon

      - name: Prepare test Environment
        run: |
          echo "::group::Set up locales"
          ./.ci/linux-setup-locales.sh
          echo "::endgroup::"

      - name: Validate composer
        run: composer validate --no-check-all --no-check-publish

      - name: Install development dependencies with Composer
        uses: ramsey/composer-install@v3
        with:
          composer-options: "--prefer-dist --ignore-platform-reqs"

      - name: Setup Tests
        run: |
          cp tests/_config/.env.default .env
          php tests/_config/generate-db-schemas.php
          vendor/bin/codecept build

      - name: Run Integration Tests
        env:
          DATA_REDIS_PORT: ${{ job.services.redis.ports['6379'] }}
          DATA_MEMCACHED_PORT: ${{ job.services.memcached.ports['11211'] }}
        if: always()
        run: vendor/bin/codecept run --coverage-xml=coverage-integration-${{ matrix.php }}.xml --ext DotReporter integration

      - name: Upload Integration Test Coverage
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-integration-${{ matrix.php }}
          path: tests/_output/coverage-integration-${{ matrix.php }}.xml
          retention-days: 7

      - name: Run Database Tests (Common)
        env:
          DATA_REDIS_PORT: ${{ job.services.redis.ports['6379'] }}
          DATA_MEMCACHED_PORT: ${{ job.services.memcached.ports['11211'] }}
          DATA_MYSQL_USER: root
        if: always()
        run: vendor/bin/codecept run --coverage-xml=coverage-database-common-${{ matrix.php }}.xml --ext DotReporter database -g common

      - name: Upload Database (Common) Coverage
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-database-common-${{ matrix.php }}
          path: tests/_output/coverage-database-common-${{ matrix.php }}.xml
          retention-days: 7

      - name: Run Database Tests (MySQL)
        env:
          DATA_MYSQL_PORT: ${{ job.services.mysql.ports['3306'] }}
          DATA_REDIS_PORT: ${{ job.services.redis.ports['6379'] }}
          DATA_MEMCACHED_PORT: ${{ job.services.memcached.ports['11211'] }}
          DATA_MYSQL_USER: root
        if: always()
        run: vendor/bin/codecept run --coverage-xml=coverage-database-mysql-${{ matrix.php }}.xml --ext DotReporter database --env mysql -g mysql

      - name: Upload Database (MySQL) Coverage
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-database-mysql-${{ matrix.php }}
          path: tests/_output/coverage-database-mysql-${{ matrix.php }}.xml
          retention-days: 7

